<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Associate Academy event poster</title>
  <desc id="desc">Green and gold poster for Associate Academy with recognition and success story theme.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f3c2a"/>
      <stop offset="0.56" stop-color="#17623f"/>
      <stop offset="1" stop-color="#f0c85a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#eff9e9" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#092216" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="905" cy="135" r="230" fill="#fff" opacity="0.11"/>
  <circle cx="128" cy="1165" r="315" fill="#07351f" opacity="0.36"/>
  <path d="M0 1010 C250 880 386 1110 640 950 C830 831 928 780 1080 830 L1080 1350 L0 1350 Z" fill="#082f20" opacity="0.56"/>
  <g filter="url(#shadow)">
    <rect x="92" y="92" width="896" height="1166" rx="54" fill="none" stroke="#ffffff" stroke-opacity="0.42" stroke-width="4"/>
    <rect x="138" y="712" width="804" height="378" rx="36" fill="url(#panel)"/>
  </g>
  <text x="138" y="210" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" letter-spacing="8">EVENT</text>
  <text x="138" y="352" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="108" font-weight="900">ASSOCIATE</text>
  <text x="138" y="468" fill="#f0c85a" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="900">ACADEMY</text>
  <rect x="138" y="530" width="398" height="12" rx="6" fill="#f0c85a"/>
  <g transform="translate(670 430)">
    <circle cx="92" cy="92" r="92" fill="#ffffff" opacity="0.18"/>
    <path d="M92 22 L112 66 L160 71 L124 103 L134 150 L92 126 L50 150 L60 103 L24 71 L72 66 Z" fill="#f0c85a"/>
  </g>
  <text x="180" y="812" fill="#17351f" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="900">RECOGNITIONS</text>
  <text x="180" y="884" fill="#17623f" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800">SUCCESS STORY</text>
  <text x="180" y="1000" fill="#34402f" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">A. K. AYYANAR NADAR MAHAL</text>
  <text x="180" y="1054" fill="#34402f" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">RAJAPALAYAM</text>
  <rect x="138" y="1142" width="804" height="86" rx="28" fill="#17351f"/>
  <text x="180" y="1198" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900">5 JUNE 2026  |  Rs. 600</text>
