<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Supervisor Workshop event poster</title>
  <desc id="desc">Green, white and gold poster for Supervisor Workshop with development theme.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12311f"/>
      <stop offset="0.5" stop-color="#006341"/>
      <stop offset="1" stop-color="#7ac143"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#092216" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <path d="M0 260 C250 122 380 334 604 210 C770 118 926 120 1080 178 L1080 0 L0 0 Z" fill="#f0c85a" opacity="0.82"/>
  <path d="M0 1070 C244 948 438 1210 690 1032 C828 934 958 916 1080 952 L1080 1350 L0 1350 Z" fill="#0b2f1f" opacity="0.5"/>
