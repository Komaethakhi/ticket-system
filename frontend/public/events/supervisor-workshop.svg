    <rect x="150" y="688" width="780" height="388" rx="34" fill="url(#card)"/>
  </g>
  <text x="150" y="342" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900">SUPERVISOR</text>
  <text x="150" y="452" fill="#f0c85a" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="900">WORKSHOP</text>
  <rect x="150" y="512" width="462" height="12" rx="6" fill="#ffffff"/>
  <g transform="translate(665 448)">
    <circle cx="94" cy="94" r="94" fill="#ffffff" opacity="0.18"/>
    <path d="M95 30 C132 30 162 61 162 98 C162 145 115 170 95 186 C75 170 28 145 28 98 C28 61 58 30 95 30 Z" fill="#f0c85a"/>
