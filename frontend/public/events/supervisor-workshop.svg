  <text x="194" y="870" fill="#17623f" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900">AND DEVELOP</text>
  <text x="194" y="988" fill="#34402f" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800">SANKARANKOVIL</text>
